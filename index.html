<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button onclick="toggleMenu()" class="fixed top-6 right-6 z-[400] w-12 h-12 bg-[#2E5EBE] rounded-full">
        <i class="fa-solid fa-bars"></i>
    </button>

    <main class="max-w-md mx-auto pt-12 p-6">
        <div class="glass rounded-[3rem] p-8 text-center border border-white/10">
            <img id="main-cover" class="w-full aspect-square rounded-3xl mb-6 object-cover shadow-2xl">
            <h2 id="main-title" class="text-2xl font-black">--</h2>
            <p id="main-artist" class="text-gray-500 mb-6">--</p>
            <audio id="main-audio"></audio>
            <button id="play-btn" class="w-20 h-20 rounded-full text-2xl"><i class="fa-solid fa-play"></i></button>
        </div>

        <div class="mt-8 glass rounded-[2rem] p-6">
            <input type="text" id="search" placeholder="Procurar som..." class="w-full bg-white/5 p-3 rounded-xl mb-4 outline-none border border-white/5">
            <div id="playlist-container" class="space-y-3 max-h-60 overflow-y-auto"></div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>

    <style>
    @media (max-height: 700px) {
        #cover-container { width: 60%; margin: 0 auto 1rem; }
        h1 { font-size: 1.5rem; }
        main { padding-top: 2rem; }
    }
    </style>
    
<div id="side-menu" class="fixed inset-0 z-[300] hidden">
    <div id="close-menu" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
    <div class="absolute right-0 top-0 bottom-0 w-72 bg-[#020617] border-l border-white/10 p-8 flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h3 class="font-black text-xl text-[#FBD8AB]">Navegação</h3>
            <i class="fa-solid fa-xmark cursor-pointer" id="menu-x"></i>
        </div>

        <nav class="flex flex-col gap-6 font-bold text-lg">
            <a href="index.html" class="flex items-center gap-4"><i class="fa-solid fa-house"></i> Home</a>
            <a href="auth/login.html" class="flex items-center gap-4"><i class="fa-solid fa-right-to-bracket"></i> Entrar / Conta</a>
            <a href="auth/perfil.html" class="flex items-center gap-4"><i class="fa-solid fa-user"></i> Meu Perfil</a>
            <a href="parcerias.html" class="flex items-center gap-4"><i class="fa-solid fa-handshake"></i> Parcerias</a>
            <a href="auth/admin.html" class="flex items-center gap-4 text-orange-500 border-t border-white/10 pt-6"><i class="fa-solid fa-shield-halved"></i> Admin</a>
        </nav>
    </div>
</div>
    
</body>
</html>
