<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sons Bwé Fixe | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white font-sans min-h-screen">

    <div class="w-full bg-gradient-to-r from-red-600 via-purple-600 to-blue-600 py-2 overflow-hidden z-[110]">
        <div class="animate-marquee whitespace-nowrap text-[10px] font-black uppercase text-center">
            BEM-VINDO AO SONS BWÉ FIXE • NOVO EP DISPONÍVEL • CRIA A TUA CONTA PARA SUBIR DE NÍVEL •
        </div>
    </div>

    <header class="flex flex-col items-center my-8">
        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center border border-white/10 mb-2">
            <i class="fa-solid fa-headphones-simple text-3xl text-blue-500"></i>
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500">SONS BWÉ FIXE</h1>
        
        <nav class="mt-4 flex gap-4">
            <a href="auth/perfil.html" class="text-[10px] font-bold uppercase tracking-widest text-blue-400 hover:text-white transition">Meu Perfil</a>
            <span class="text-gray-700">|</span>
            <a href="auth/login.html" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition">Sair / Entrar</a>
        </nav>
    </header>

    <main class="glass max-w-md mx-auto rounded-[3rem] p-8 border border-white/10 relative shadow-2xl">
        <div id="cover-container" class="w-full aspect-square rounded-3xl mb-8 overflow-hidden relative shadow-inner">
            <img id="main-cover" src="capas/default.jpg" class="w-full h-full object-cover transition-transform duration-700">
            <div id="party-lights" class="absolute inset-0 hidden"></div>
        </div>
        
        <div class="text-center mb-8">
            <h2 id="main-title" class="text-2xl font-black truncate">Escolha um som</h2>
            <p id="main-artist" class="text-gray-500 text-sm">Sons Bwé Fixe</p>
        </div>

        <audio id="main-audio"></audio>
        <input type="range" id="progress-bar" value="0" class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer mb-8">
        
        <div class="flex justify-between items-center mb-6">
            <button id="prev-btn" class="text-xl text-gray-500 hover:text-white"><i class="fa-solid fa-backward-step"></i></button>
            <button id="play-btn" class="w-16 h-16 bg-blue-600 rounded-full text-2xl shadow-lg shadow-blue-500/40 hover:scale-105 transition"><i class="fa-solid fa-play"></i></button>
            <button id="next-btn" class="text-xl text-gray-500 hover:text-white"><i class="fa-solid fa-forward-step"></i></button>
        </div>
    </main>

    <section class="max-w-md mx-auto mt-10 p-8 glass rounded-[3rem] border border-white/10 mb-20">
        <h3 class="font-black text-sm uppercase tracking-widest mb-6 flex items-center gap-2">
            <i class="fa-solid fa-handshake text-blue-500"></i> Parcerias & Apoio
        </h3>
        <form id="contact-form" class="space-y-4">
            <input type="text" placeholder="Teu Nome" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none transition">
            
            <select id="form-subject" class="w-full bg-[#0f172a] border border-white/10 rounded-2xl p-4 text-sm text-gray-400 outline-none">
                <option value="parceria">Solicitação de Parceria</option>
                <option value="pagamento">Enviar Comprovativo (Foto)</option>
                <option value="duvida">Dúvida Geral</option>
            </select>

            <div class="bg-white/5 border border-dashed border-white/20 p-4 rounded-2xl text-center">
                <label for="form-file" class="cursor-pointer group">
                    <i class="fa-solid fa-cloud-arrow-up text-xl text-gray-600 group-hover:text-blue-500 transition"></i>
                    <p class="text-[9px] text-gray-500 mt-2 uppercase font-bold">Anexar Imagem / Comprovativo</p>
                    <input type="file" id="form-file" accept="image/*" class="hidden">
                </label>
            </div>

            <textarea id="form-desc" placeholder="Escreve aqui os detalhes..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm h-24 focus:border-blue-500 outline-none transition"></textarea>
            
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                Enviar Solicitação
            </button>
        </form>
    </section>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] opacity-0 pointer-events-none transition-all duration-500 scale-90">
        <div class="glass border border-white/10 px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-4 min-w-[280px]">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs"></div>
            <div>
                <p id="toast-title" class="font-black text-[10px] uppercase tracking-widest"></p>
                <p id="toast-msg" class="text-[10px] text-gray-400"></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
