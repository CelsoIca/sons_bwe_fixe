<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#020617] flex items-center justify-center min-h-screen p-6 font-sans">

    <div class="glass w-full max-w-sm rounded-[3rem] p-10 text-white text-center border border-white/5 shadow-2xl">
        
        <div class="mb-8">
            <h1 class="text-xl font-black uppercase text-[#EF3C54] tracking-tighter">Sons Bwé Fixe</h1>
            <p id="auth-subtitle" class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-1">Bem-vindo à Família</p>
        </div>

        <h2 id="auth-title" class="text-3xl font-black mb-8 italic">Entrar</h2>

        <div id="name-field" class="hidden mb-4 animate-fade-in">
            <input type="text" id="user-name" placeholder="Teu Nome / Nickname" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-[#2E5EBE] transition text-sm">
        </div>

        <div class="mb-4 relative">
            <input type="email" id="user-email" placeholder="E-mail" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-[#2E5EBE] transition text-sm">
        </div>

        <div class="mb-8 relative">
            <input type="password" id="user-pass" placeholder="Palavra-passe" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-[#2E5EBE] transition text-sm">
        </div>
        
        <button id="auth-btn" class="w-full bg-[#EF3C54] py-4 rounded-2xl font-black shadow-lg shadow-pink-500/20 hover:scale-[1.02] active:scale-95 transition disabled:opacity-50">
            ENTRAR
        </button>

        <div class="mt-8 pt-6 border-t border-white/5">
            <p id="toggle-text" class="text-[10px] text-gray-500 font-bold uppercase mb-2">Ainda não tens conta?</p>
            <button id="toggle-auth" class="text-xs text-[#2E5EBE] uppercase font-black hover:underline tracking-widest">
                Criar Conta Agora
            </button>
        </div>

        <a href="../index.html" class="inline-block mt-8 text-[9px] text-gray-600 font-bold uppercase hover:text-white transition">
            <i class="fa-solid fa-arrow-left mr-1"></i> Voltar à Home
        </a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="../script.js"></script>

    <script>
        const authBtn = document.getElementById('auth-btn');
        const authTitle = document.getElementById('auth-title');
        const toggleBtn = document.getElementById('toggle-auth');
        const nameField = document.getElementById('name-field');
        const toggleText = document.getElementById('toggle-text');

        // 1. ALTERNAR ENTRE LOGIN E CADASTRO
        toggleBtn.onclick = () => {
            const isLogin = authTitle.innerText === "Entrar";
            
            authTitle.innerText = isLogin ? "Criar Conta" : "Entrar";
            authBtn.innerText = isLogin ? "CADASTRAR" : "ENTRAR";
            toggleBtn.innerText = isLogin ? "Já tenho conta" : "Criar Conta Agora";
            toggleText.innerText = isLogin ? "Já fazes parte da tropa?" : "Ainda não tens conta?";
            
            if (isLogin) {
                nameField.classList.remove('hidden');
            } else {
                nameField.classList.add('hidden');
            }
        };

        // 2. LÓGICA DE AUTENTICAÇÃO
        authBtn.onclick = async () => {
            const email = document.getElementById('user-email').value.trim();
            const pass = document.getElementById('user-pass').value.trim();
            const nome = document.getElementById('user-name').value.trim();
            const isLogin = authTitle.innerText === "Entrar";

            if (!email || !pass) return alert("Preenche todos os campos!");
            if (!isLogin && !nome) return alert("Precisamos do teu nome para o perfil!");

            authBtn.innerText = "A PROCESSAR...";
            authBtn.disabled = true;

            try {
                if (isLogin) {
                    // --- TENTATIVA DE LOGIN ---
                    const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                    const uid = userCredential.user.uid;

                    // VERIFICAÇÃO DE BANIMENTO (Sincronizado com Admin)
                    const userDoc = await db.collection("users").doc(uid).get();
                    if (userDoc.exists && userDoc.data().ativo === false) {
                        alert("❌ Esta conta foi desativada pelo administrador.");
                        await auth.signOut();
                        location.reload();
                        return;
                    }

                    window.location.href = "../index.html";

                } else {
                    // --- TENTATIVA DE CADASTRO ---
                    const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                    const user = userCredential.user;

                    // Criar Perfil no Firestore (Sincronizado com o sistema de roles)
                    await db.collection("users").doc(user.uid).set({
                        nome: nome,
                        email: email,
                        role: 'user',       // Sempre começa como user
                        ativo: true,        // Sempre começa ativo
                        dataCriacao: firebase.firestore.FieldValue.serverTimestamp(),
                        fotoUrl: "../assets/default-user.png", // Foto padrão
                        endereco: ""
                    });

                    alert("🎉 Bem-vindo à Sons Bwé Fixe!");
                    window.location.href = "../index.html";
                }
            } catch (error) {
                console.error(error);
                // Tratamento de erros amigável
                switch (error.code) {
                    case 'auth/email-already-in-use': alert("Este email já está em uso!"); break;
                    case 'auth/invalid-email': alert("Email inválido!"); break;
                    case 'auth/weak-password': alert("A palavra-passe deve ter pelo menos 6 caracteres!"); break;
                    case 'auth/wrong-password': alert("Palavra-passe incorreta!"); break;
                    case 'auth/user-not-found': alert("Utilizador não encontrado!"); break;
                    default: alert("Erro: " + error.message);
                }
            } finally {
                authBtn.innerText = isLogin ? "ENTRAR" : "CADASTRAR";
                authBtn.disabled = false;
            }
        };
    </script>

</body>
</html>
