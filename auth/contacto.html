<body class="bg-[#020617] text-white p-6">
    <div class="max-w-md mx-auto text-center pt-10 animate-fade-in">
        <header class="mb-12">
            <h1 class="text-4xl font-black italic tracking-tighter mb-2">NOSSOS <span class="text-[#EF3C54]">NÚMEROS</span></h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.4em]">Sons Bwé Fixe Community</p>
        </header>
        
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="glass p-8 rounded-[2.5rem] border border-white/5">
                <h3 class="text-3xl font-black text-[#EF3C54] mb-1">1.2k</h3>
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">PLAYS</p>
            </div>
            <div class="glass p-8 rounded-[2.5rem] border border-white/5">
                <h3 class="text-3xl font-black text-[#2E5EBE] mb-1">45+</h3>
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">ARTISTAS</p>
            </div>
        </div>

     <form 
      action="https://formspree.io/f/xbdzperj" 
      method="POST"
      id="contact-form" 
      class="glass p-10 rounded-[3.5rem] text-left space-y-5 border border-white/10 relative overflow-hidden shadow-2xl"
    >
    <h2 class="font-black text-sm uppercase tracking-widest text-white flex items-center gap-2">
        <i class="fa-solid fa-paper-plane text-[#2E5EBE]"></i> Enviar Proposta
    </h2>
    
    <input type="text" name="nome" placeholder="Teu Nome" required 
    class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none focus:border-[#2E5EBE] transition text-sm">
    
    <input type="email" name="email" placeholder="Teu Email" required 
    class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none focus:border-[#2E5EBE] transition text-sm">
    
    <textarea name="mensagem" placeholder="Como podemos ajudar?" required 
    class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl h-32 outline-none focus:border-[#2E5EBE] transition text-sm resize-none"></textarea>
    
    <input type="text" name="_gotcha" style="display:none">

    <button type="submit" id="btn-enviar" class="w-full bg-[#2E5EBE] py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] shadow-lg shadow-blue-500/20 hover:scale-[1.02] active:scale-95 transition">
        ENVIAR AGORA
    </button>
</form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../script.js"></script>
    <script>
      const form = document.getElementById("contact-form");

async function handleSubmit(event) {
    event.preventDefault();
    const status = document.getElementById("btn-enviar");
    const data = new FormData(event.target);
    
    status.innerText = "A ENVIAR...";
    status.disabled = true;

    fetch(event.target.action, {
        method: form.method,
        body: data,
        headers: {
            'Accept': 'application/json'
        }
    }).then(response => {
        if (response.ok) {
            alert("✅ Proposta enviada, General! Verificamos o e-mail em breve.");
            form.reset();
        } else {
            alert("❌ Erro ao enviar. Tenta novamente.");
        }
    }).catch(error => {
        alert("❌ Erro de rede. Verifica a internet.");
    }).finally(() => {
        status.innerText = "ENVIAR AGORA";
        status.disabled = false;
    });
}

form.addEventListener("submit", handleSubmit);
    </script>
</body>
