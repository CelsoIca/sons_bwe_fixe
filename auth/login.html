<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-6">

    <div class="glass max-w-md w-full rounded-[3rem] p-10 border border-white/10 shadow-2xl">
        <div class="text-center mb-10">
            <h1 id="auth-title" class="text-3xl font-black italic">BEM-VINDO</h1>
            <p id="auth-subtitle" class="text-gray-500 text-[10px] uppercase tracking-[0.3em] mt-2">Acede à tua conta Sons Bwé Fixe</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div id="name-field" class="hidden">
                <input type="text" id="user-name" placeholder="Teu Nome Completo" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 transition">
            </div>

            <input type="email" id="user-email" placeholder="E-mail" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 transition">
            
            <input type="password" id="user-pass" placeholder="Palavra-passe" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 transition">

            <button type="submit" id="auth-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                Entrar no Ritmo
            </button>
        </form>

        <div class="mt-8 text-center space-y-4">
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest cursor-pointer hover:text-white transition" id="toggle-auth">
                Não tens conta? <span class="text-blue-500">Cria uma aqui</span>
            </p>
            <a href="recuperar.html" class="block text-[10px] text-gray-600 uppercase font-bold tracking-widest hover:text-red-400">Esqueci a palavra-passe</a>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] opacity-0 pointer-events-none transition-all duration-500 scale-90">
        <div class="glass border border-white/10 px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-4 min-w-[280px]">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs"></div>
            <div><p id="toast-title" class="font-black text-[10px] uppercase tracking-widest"></p><p id="toast-msg" class="text-[10px] text-gray-400"></p></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../script.js"></script> <script>
        let isLogin = true;
        const toggleBtn = document.getElementById('toggle-auth');
        const nameField = document.getElementById('name-field');
        const authTitle = document.getElementById('auth-title');
        const authBtn = document.getElementById('auth-btn');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            nameField.classList.toggle('hidden');
            authTitle.innerText = isLogin ? "BEM-VINDO" : "NOVA CONTA";
            authBtn.innerText = isLogin ? "Entrar no Ritmo" : "Criar Conta";
            toggleBtn.innerHTML = isLogin ? 'Não tens conta? <span class="text-blue-500">Cria uma aqui</span>' : 'Já tens conta? <span class="text-blue-500">Entra aqui</span>';
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            const nome = document.getElementById('user-name').value;

            try {
                if (isLogin) {
                    await auth.signInWithEmailAndPassword(email, pass);
                    showToast("Sucesso", "Bem-vindo de volta!", "success");
                } else {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection("users").doc(res.user.uid).set({
                        nome: nome,
                        email: email,
                        role: 'user',
                        createdAt: new Date()
                    });
                    showToast("Conta Criada", "Aproveita os sons!", "success");
                }
                setTimeout(() => window.location.href = "../index.html", 1500);
            } catch (err) {
                showToast("Erro", err.message, "error");
            }
        });
    </script>
</body>
</html>
