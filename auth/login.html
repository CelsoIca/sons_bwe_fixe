<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css"> </head>
<body class="bg-[#020617] flex items-center justify-center min-h-screen p-6">
    <div class="glass w-full max-w-sm rounded-[3rem] p-10 text-white text-center">
        <h2 id="auth-title" class="text-3xl font-black mb-8">Entrar</h2>
        <div id="name-field" class="hidden mb-4">
            <input type="text" id="user-name" placeholder="Teu Nome" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none">
        </div>
        <input type="email" id="user-email" placeholder="E-mail" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 mb-4 outline-none">
        <input type="password" id="user-pass" placeholder="Palavra-passe" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 mb-8 outline-none">
        
        <button id="auth-btn" class="w-full bg-[#EF3C54] py-4 rounded-2xl font-bold">ENTRAR</button>
        <button id="toggle-auth" class="mt-6 text-xs text-[#2E5EBE] uppercase font-black">Criar Conta</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../script.js"></script> <script>
        // Lógica de Troca de Tela
        document.getElementById('toggle-auth').onclick = () => {
            const isLogin = document.getElementById('auth-title').innerText === "Entrar";
            document.getElementById('auth-title').innerText = isLogin ? "Criar Conta" : "Entrar";
            document.getElementById('name-field').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isLogin ? "CADASTRAR" : "ENTRAR";
        };

        // ESCUTAR O CLIQUE NO BOTÃO DE LOGIN/CADASTRO
const authBtn = document.getElementById('auth-btn');

if (authBtn) {
    authBtn.onclick = async () => {
        const email = document.getElementById('user-email').value;
        const pass = document.getElementById('user-pass').value;
        const nome = document.getElementById('user-name').value;
        const isLogin = document.getElementById('auth-title').innerText === "Entrar";

        if (!email || !pass) return alert("Preenche os campos obrigatórios!");

        authBtn.innerText = "A processar...";
        authBtn.disabled = true;

        try {
            if (isLogin) {
                // --- LOGIC: ENTRAR ---
                await auth.signInWithEmailAndPassword(email, pass);
                alert("Bem-vindo de volta!");
                window.location.href = "../index.html";
            } else {
                // --- LOGIC: CADASTRAR ---
                if (!nome) return alert("Diz-nos o teu nome!");
                
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // Salvar dados extras no Firestore
                await db.collection("users").doc(user.uid).set({
                    nome: nome,
                    email: email,
                    role: 'user', // Por padrão é usuário comum
                    dataCriacao: firebase.firestore.FieldValue.serverTimestamp(),
                    fotoUrl: ""
                });

                alert("Conta criada com sucesso!");
                window.location.href = "../index.html";
            }
        } catch (error) {
            console.error(error);
            // Tradução de erros comuns do Firebase
            if (error.code === 'auth/email-already-in-use') alert("Este email já está registado!");
            else if (error.code === 'auth/wrong-password') alert("Palavra-passe incorreta!");
            else if (error.code === 'auth/user-not-found') alert("Utilizador não encontrado!");
            else alert("Erro: " + error.message);
        } finally {
            authBtn.innerText = isLogin ? "ENTRAR" : "CADASTRAR";
            authBtn.disabled = false;
        }
    };
}
        
    </script>
</body>
</html>
