<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acesso | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-6">

    <div class="glass max-w-sm w-full rounded-[3rem] p-10 border border-white/10 text-center">
        <h1 class="text-2xl font-black italic mb-4">RECUPERAR</h1>
        <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-8">Enviaremos um link para o teu e-mail</p>

        <form id="recover-form" class="space-y-6">
            <input type="email" id="recover-email" placeholder="Teu e-mail de conta" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500">
            
            <button type="submit" class="w-full bg-white text-black py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-gray-200 transition">
                Enviar Link
            </button>
        </form>

        <a href="login.html" class="inline-block mt-8 text-[9px] text-gray-500 font-bold uppercase tracking-[0.2em] border-b border-gray-700 pb-1">Voltar ao Login</a>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] opacity-0 pointer-events-none transition-all duration-500 scale-90">
        <div class="glass border border-white/10 px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-4 min-w-[280px]">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs"></div>
            <div><p id="toast-title" class="font-black text-[10px] uppercase tracking-widest"></p><p id="toast-msg" class="text-[10px] text-gray-400"></p></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../script.js"></script>
    <script>
        document.getElementById('recover-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('recover-email').value;
            try {
                await auth.sendPasswordResetEmail(email);
                showToast("E-mail Enviado", "Verifica a tua caixa de entrada!", "success");
            } catch (err) {
                showToast("Erro", "E-mail não encontrado.", "error");
            }
        });
    </script>
</body>
</html>
