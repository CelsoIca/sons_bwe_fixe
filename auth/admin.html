<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#020617] text-white p-4 md:p-8">

    <div id="admin-content" class="max-w-4xl mx-auto hidden">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic">PAINEL ADMIN</h1>
                <p class="text-gray-500 text-xs uppercase tracking-widest">Gestão de Parcerias e Provas</p>
            </div>
            <button onclick="location.href='../index.html'" class="glass px-6 py-2 rounded-full text-[10px] font-bold border border-white/10">VOLTAR AO SITE</button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass p-4 rounded-3xl border border-white/5 text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Total Mensagens</p>
                <p id="stat-total" class="text-2xl font-black text-blue-500">0</p>
            </div>
        </div>

        <div id="mensagens-lista" class="space-y-4">
            <p class="text-center text-gray-600 animate-pulse">A carregar mensagens...</p>
        </div>
    </div>

    <div id="admin-denied" class="fixed inset-0 bg-[#020617] flex flex-col items-center justify-center text-center p-6 hidden">
        <i class="fa-solid fa-lock text-5xl text-red-500 mb-4"></i>
        <h2 class="text-2xl font-black">ACESSO RESTRITO</h2>
        <p class="text-gray-500 mt-2">Apenas administradores podem ver esta página.</p>
        <a href="../index.html" class="mt-6 bg-white text-black px-8 py-3 rounded-full font-bold text-xs uppercase">Voltar</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../script.js"></script> 
    <script src="admin.js"></script>
</body>
</html>
