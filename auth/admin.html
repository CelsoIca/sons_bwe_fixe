<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#020617] text-white p-6">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black border-l-4 border-[#EF3C54] pl-4">PAINEL DO GENERAL</h1>
                <p class="text-gray-500 text-xs mt-1 uppercase tracking-widest">Gestão de Conteúdo e Parcerias</p>
            </div>
            <a href="../index.html" class="bg-white/5 p-3 rounded-full hover:bg-white/10 transition">
                <i class="fa-solid fa-house text-[#2E5EBE]"></i>
            </a>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            
            <section class="space-y-6">
                <div class="glass p-8 rounded-[2.5rem] border border-white/10">
                    <h3 class="font-bold text-[#FBD8AB] mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-plus-circle text-[#EF3C54]"></i> Postar Novo Som
                    </h3>
                    
                    <div class="space-y-4" id="form-musica">
                        <input type="text" id="adm-titulo" placeholder="Título da Música" class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none focus:border-[#EF3C54]/50 transition">
                        <input type="text" id="adm-artista" placeholder="Nome do Artista" class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none focus:border-[#EF3C54]/50 transition">
                        <input type="text" id="adm-url" placeholder="Link Direto do MP3" class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none focus:border-[#2E5EBE]/50 transition">
                        <input type="text" id="adm-capa" placeholder="Link da Capa (ImgBB)" class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none focus:border-[#2E5EBE]/50 transition">
                        
                        <button onclick="adicionarMusicaFirestore()" class="w-full bg-[#EF3C54] py-4 rounded-2xl font-black shadow-lg shadow-pink-500/20 hover:scale-[1.02] transition">
                            PUBLICAR AGORA
                        </button>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2rem] border border-white/10">
                    <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase">Músicas no Ar</h3>
                    <div id="adm-lista-preview" class="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scroll">
                        </div>
                </div>
            </section>

            <section class="glass p-8 rounded-[2.5rem] border border-white/10">
                <h3 class="font-bold text-[#FBD8AB] mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-handshake text-[#FF553A]"></i> Solicitações de Parceria
                </h3>
                
                <div id="adm-lista-parcerias" class="space-y-4">
                    <p class="text-gray-600 text-xs text-center py-10 italic">Nenhuma proposta pendente...</p>
                </div>
            </section>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../script.js"></script>

    <script>
        // Função para Adicionar Música ao Firestore
        async function adicionarMusicaFirestore() {
            const titulo = document.getElementById('adm-titulo').value;
            const artista = document.getElementById('adm-artista').value;
            const url = document.getElementById('adm-url').value;
            const capa = document.getElementById('adm-capa').value;

            if(!titulo || !artista || !url) return alert("Preenche os campos obrigatórios!");

            try {
                // Pega o número atual de músicas para definir a ordem
                const snap = await db.collection("playlist").get();
                const ordem = snap.size + 1;

                await db.collection("playlist").add({
                    titulo, artista, url, capa, ordem,
                    dataPostagem: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Sucesso! Música adicionada à Vibe.");
                document.querySelectorAll('#form-musica input').forEach(i => i.value = "");
            } catch (error) {
                console.error(error);
                alert("Erro ao publicar música.");
            }
        }

        // Listener para as Parcerias (Real-time)
        db.collection("parcerias").orderBy("data", "desc").onSnapshot(snap => {
            const container = document.getElementById('adm-lista-parcerias');
            container.innerHTML = "";

            snap.forEach(doc => {
                const p = doc.data();
                container.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 relative group">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-sm text-[#2E5EBE]">${p.nome}</h4>
                            <span class="text-[8px] bg-blue-500/10 text-blue-400 px-2 py-1 rounded-md uppercase">${p.tipo || 'Geral'}</span>
                        </div>
                        <p class="text-xs text-gray-400 leading-relaxed">${p.mensagem}</p>
                        <div class="mt-3 flex gap-2">
                            <button class="text-[9px] text-red-400 hover:text-red-300" onclick="eliminarParceria('${doc.id}')">Eliminar</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
