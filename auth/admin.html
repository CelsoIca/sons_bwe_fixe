<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#020617] p-6 text-white">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black mb-8">Novo Som</h1>
        <div class="glass p-8 rounded-[3rem] space-y-4">
            <input type="text" id="adm-titulo" placeholder="Título" class="w-full bg-white/5 p-4 rounded-2xl outline-none">
            <input type="text" id="adm-artista" placeholder="Artista" class="w-full bg-white/5 p-4 rounded-2xl outline-none">
            <input type="text" id="adm-url" placeholder="URL do MP3" class="w-full bg-white/5 p-4 rounded-2xl outline-none">
            
            <p class="text-[10px] text-gray-500 uppercase">Capa da Música</p>
            <input type="file" id="adm-ficheiro-capa" class="text-xs">
            
            <button onclick="salvarNoFirestore()" id="btn-pub" class="w-full bg-[#2E5EBE] py-4 rounded-2xl font-bold mt-4">PUBLICAR AGORA</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../script.js"></script>

    <script>
        async function salvarNoFirestore() {
            const btn = document.getElementById('btn-pub');
            const file = document.getElementById('adm-ficheiro-capa').files[0];
            btn.innerText = "A carregar imagem...";
            
            let linkCapa = "";
            if(file) linkCapa = await uploadParaImgBB(file);

            await db.collection("playlist").add({
                titulo: document.getElementById('adm-titulo').value,
                artista: document.getElementById('adm-artista').value,
                url: document.getElementById('adm-url').value,
                capa: linkCapa,
                ordem: Date.now()
            });
            alert("Música no ar!");
            window.location.reload();
        }
    </script>
</body>
</html>
