<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel General | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#020617] text-white flex h-screen overflow-hidden">

    <div id="error-overlay" class="fixed inset-0 z-[1000] bg-[#EF3C54] flex flex-col items-center justify-center text-center p-6 hidden">
        <i class="fa-solid fa-triangle-exclamation text-7xl text-white mb-6 animate-bounce"></i>
        <h1 class="text-4xl font-black mb-2">ACESSO RESTRITO</h1>
        <p class="mb-8">Área exclusiva para o General.</p>
        <button onclick="window.location.href='../index.html'" class="bg-white text-[#EF3C54] px-8 py-4 rounded-2xl font-black">VOLTAR</button>
    </div>

    <aside class="w-72 bg-[#020617] border-r border-white/5 flex flex-col p-6 h-full z-[100]">
        <div class="mb-10 px-2 text-center">
            <h1 class="text-xl font-black uppercase text-[#EF3C54]">Sons Bwé Fixe</h1>
            <p class="text-[9px] text-gray-600 font-bold uppercase tracking-[0.3em]">Admin Panel</p>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="abrirAba('musicas')" id="btn-musicas" class="aba-btn w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-gray-400 font-bold text-sm">
                <i class="fa-solid fa-music"></i> Gestão de Músicas
            </button>
            <button onclick="abrirAba('usuarios')" id="btn-usuarios" class="aba-btn w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-gray-400 font-bold text-sm">
                <i class="fa-solid fa-users"></i> Gestão de Usuários
            </button>
            <button onclick="abrirAba('parcerias')" id="btn-parcerias" class="aba-btn w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-gray-400 font-bold text-sm">
                <i class="fa-solid fa-handshake"></i> Parcerias
            </button>
        </nav>

        <div class="pt-6 border-t border-white/5 space-y-4">
            <a href="../index.html" class="flex items-center gap-4 p-4 text-gray-600 hover:text-white transition text-xs font-bold uppercase">
                <i class="fa-solid fa-house"></i> Voltar à Home
            </a>
            <button onclick="logout()" class="w-full bg-red-500/10 text-red-500 p-4 rounded-2xl font-bold text-xs hover:bg-red-500/20 transition">
                SAIR DO SISTEMA
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-10 bg-[#03081a]">
        
        <section id="aba-musicas" class="aba-content hidden animate-fade-in">
            <h2 class="text-2xl font-black italic mb-8">Gestão de Músicas</h2>
            
            <div class="glass p-8 rounded-[2.5rem] border border-white/10 mb-10">
                <div class="grid md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="adm-titulo" placeholder="Título" class="bg-white/5 border border-white/5 p-4 rounded-2xl outline-none">
                    <input type="text" id="adm-artista" placeholder="Artista" class="bg-white/5 border border-white/5 p-4 rounded-2xl outline-none">
                </div>
                <div class="grid md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="adm-url" placeholder="Link MP3 (External URL)" class="bg-white/5 border border-white/5 p-4 rounded-2xl outline-none text-xs">
                    <select id="adm-tipo" class="bg-[#020617] border border-white/5 p-4 rounded-2xl outline-none text-gray-400">
                        <option value="Single">Single</option>
                        <option value="Album">Album</option>
                        <option value="EP">EP</option>
                        <option value="Mixtape">Mixtape</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-[10px] text-gray-500 uppercase mb-2">Capa da Música</label>
                    <input type="file" id="adm-ficheiro-capa" class="text-xs text-gray-500">
                </div>
                <button onclick="publicarMusicaAdmin()" id="btn-publicar" class="w-full bg-[#EF3C54] py-4 rounded-2xl font-black hover:scale-105 transition">PUBLICAR NO PLAYER</button>
            </div>

            <div id="adm-lista-musicas" class="grid gap-4">
                </div>
        </section>

        <section id="aba-usuarios" class="aba-content hidden animate-fade-in">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic">Gestão de Usuários</h2>
                <button onclick="document.getElementById('modal-user').classList.remove('hidden')" class="bg-[#2E5EBE] px-6 py-3 rounded-xl font-bold text-xs">+ CRIAR NOVO</button>
            </div>
            <div class="glass rounded-[2rem] border border-white/5 overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-gray-500 uppercase text-[10px] font-black">
                        <tr><th class="p-6">Usuário</th><th>Status</th><th>Cargo</th><th class="text-right p-6">Ações</th></tr>
                    </thead>
                    <tbody id="lista-usuarios-admin"></tbody>
                </table>
            </div>
        </section>

        <section id="aba-parcerias" class="aba-content hidden animate-fade-in">
            <h2 class="text-2xl font-black italic mb-8">Propostas de Parceria</h2>
            <div id="adm-lista-parcerias" class="grid md:grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="modal-user" class="fixed inset-0 z-[600] bg-black/90 backdrop-blur-md flex items-center justify-center hidden p-6">
        <div class="glass w-full max-w-md p-10 rounded-[3rem] border border-white/10 relative">
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="absolute top-6 right-6 text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-xl font-black mb-6">Novo Usuário</h2>
            <div class="space-y-4">
                <input type="text" id="new-user-nome" placeholder="Nome" class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none">
                <input type="email" id="new-user-email" placeholder="Email" class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none">
                <input type="password" id="new-user-pass" placeholder="Senha" class="w-full bg-white/5 border border-white/5 p-4 rounded-2xl outline-none">
                <select id="new-user-role" class="w-full bg-[#020617] border border-white/5 p-4 rounded-2xl outline-none">
                    <option value="user">Ouvinte (User)</option>
                    <option value="admin">Administrador (General)</option>
                </select>
                <button onclick="confirmarCriarUsuario()" id="btn-conf-user" class="w-full bg-[#2E5EBE] py-4 rounded-2xl font-black">CRIAR CONTA</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../script.js"></script>

    <script>
        // --- 1. CONTROLO DE ABAS ---
        function abrirAba(nome) {
            document.querySelectorAll('.aba-content').forEach(a => a.classList.add('hidden'));
            document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('bg-white/5', 'text-white'));
            document.getElementById('aba-' + nome).classList.remove('hidden');
            document.getElementById('btn-' + nome).classList.add('bg-white/5', 'text-white');
            if(nome === 'usuarios') carregarUsuariosAdmin();
            if(nome === 'musicas') carregarMusicasAdmin();
            if(nome === 'parcerias') carregarParcerias();
        }

        // --- 2. SEGURANÇA ---
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists && doc.data().role === 'admin') {
                    abrirAba('musicas');
                } else {
                    document.getElementById('error-overlay').classList.remove('hidden');
                }
            } else { window.location.href = "login.html"; }
        });

        // --- 3. GESTÃO DE MÚSICAS ---
        async function publicarMusicaAdmin() {
            const btn = document.getElementById('btn-publicar');
            const fileCapa = document.getElementById('adm-ficheiro-capa').files[0];
            const dados = {
                titulo: document.getElementById('adm-titulo').value,
                artista: document.getElementById('adm-artista').value,
                url: document.getElementById('adm-url').value,
                tipo: document.getElementById('adm-tipo').value,
                oculto: false,
                ordem: Date.now()
            };

            if(!dados.titulo || !dados.url) return alert("Preenche os campos!");
            btn.innerText = "A PROCESSAR...";

            if(fileCapa) dados.capa = await uploadParaImgBB(fileCapa);
            await db.collection("playlist").add(dados);
            alert("Publicado!");
            location.reload();
        }

        function carregarMusicasAdmin() {
            db.collection("playlist").orderBy("ordem", "desc").onSnapshot(snap => {
                const list = document.getElementById('adm-lista-musicas');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    list.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex items-center justify-between border border-white/5 ${m.oculto ? 'opacity-40' : ''}">
                            <div class="flex items-center gap-4">
                                <img src="${m.capa || '../assets/default.png'}" class="w-10 h-10 rounded-lg object-cover">
                                <div><h4 class="text-sm font-bold">${m.titulo}</h4><p class="text-[10px] text-gray-500 uppercase">${m.tipo}</p></div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="toggleOcultarMusica('${doc.id}', ${m.oculto})" class="p-2 hover:text-orange-500"><i class="fa-solid ${m.oculto ? 'fa-eye-slash' : 'fa-eye'}"></i></button>
                                <button onclick="apagarMusica('${doc.id}')" class="p-2 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        async function toggleOcultarMusica(id, status) {
            await db.collection("playlist").doc(id).update({ oculto: !status });
        }

        async function apagarMusica(id) {
            if(confirm("Eliminar música?")) await db.collection("playlist").doc(id).delete();
        }

        // --- 4. GESTÃO DE USUÁRIOS ---
        function carregarUsuariosAdmin() {
            db.collection("users").onSnapshot(snap => {
                const lista = document.getElementById('lista-usuarios-admin');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    lista.innerHTML += `
                        <tr class="border-t border-white/5">
                            <td class="p-6 font-bold">${u.nome}</td>
                            <td class="${u.ativo !== false ? 'text-green-500' : 'text-red-500'} font-black text-[10px] uppercase">${u.ativo !== false ? 'Ativo' : 'Banido'}</td>
                            <td class="text-gray-400 text-xs">${u.role}</td>
                            <td class="p-6 text-right space-x-2">
                                <button onclick="toggleUserStatus('${doc.id}', ${u.ativo !== false})" class="hover:text-white"><i class="fa-solid fa-power-off"></i></button>
                                <button onclick="excluirUsuario('${doc.id}')" class="hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
            });
        }

        async function confirmarCriarUsuario() {
            const email = document.getElementById('new-user-email').value;
            const pass = document.getElementById('new-user-pass').value;
            const nome = document.getElementById('new-user-nome').value;
            const role = document.getElementById('new-user-role').value;
            
            try {
                // Criação simples (Nota: o Admin deve usar Firebase Admin SDK para real criação sem deslogar, 
                // mas aqui simulamos via Firestore para tua gestão visual)
                await db.collection("users").add({ nome, email, role, ativo: true });
                alert("Usuário registrado na base de dados!");
                document.getElementById('modal-user').classList.add('hidden');
            } catch(e) { alert("Erro ao criar."); }
        }

        async function toggleUserStatus(id, status) {
            await db.collection("users").doc(id).update({ ativo: !status });
        }

        async function excluirUsuario(id) {
            if(confirm("Excluir conta definitivamente?")) await db.collection("users").doc(id).delete();
        }

        // --- 5. PARCERIAS ---
        function carregarParcerias() {
            db.collection("contacto").orderBy("data", "desc").onSnapshot(snap => {
                const list = document.getElementById('adm-lista-parcerias');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    list.innerHTML += `
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <h4 class="font-black text-sm text-[#2E5EBE]">${p.nome}</h4>
                            <p class="text-xs text-gray-300 my-2">${p.mensagem}</p>
                            <div class="flex gap-4">
                                <a href="mailto:${p.email}" class="text-[9px] font-bold text-orange-500 uppercase">Responder</a>
                                <button onclick="db.collection('contactos').doc('${doc.id}').delete()" class="text-[9px] font-bold text-gray-600 uppercase">Apagar</button>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
