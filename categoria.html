<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        @media (min-width: 768px) {
            #sidebar { transform: translateX(0) !important; position: fixed; z-index: 50; }
            #sidebar-overlay { display: none !important; }
            #toggle-sidebar-btn { display: none !important; }
            #main-wrapper { margin-left: 18rem; }
        }
        @media (max-width: 767px) { #main-wrapper { margin-left: 0; } }
    </style>
</head>
<body class="bg-[#020617] text-white">

    <button id="toggle-sidebar-btn" onclick="toggleSidebar()" class="fixed top-6 left-6 z-[100] glass w-12 h-12 flex items-center justify-center rounded-full border border-white/10 hover:bg-white/10 transition text-[#2E5EBE]">
        <i class="fa-solid fa-bars-staggered"></i>
    </button>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-[200] w-72 bg-[#020617]/95 backdrop-blur-xl border-r border-white/5 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="p-8 h-full flex flex-col">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-xl font-black uppercase tracking-tighter">Explorar</h2>
                    <p class="text-[8px] text-gray-600 font-bold uppercase tracking-widest mt-0.5">Sons Bwé Fixe</p>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="relative mb-6">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                <input type="text" id="search-cat" oninput="pesquisarNaCategoria()" placeholder="Pesquisar nesta categoria..."
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pl-10 pr-4 text-xs outline-none focus:border-[#EF3C54] transition">
            </div>

            <nav class="space-y-1 flex-1 overflow-y-auto" id="nav-categorias">
                <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest mb-3 ml-2">Categorias</p>
                <!-- Todas → modo accordion -->
                <a href="categoria.html" class="category-link w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition group text-left">
                    <i class="fa-solid fa-layer-group text-[#2E5EBE]"></i>
                    <span class="text-sm font-bold group-hover:text-white text-gray-400">Todas</span>
                </a>
                <!-- Categorias carregadas dinamicamente do Firebase pelo categoria-page.js -->
            </nav>

            <div class="mt-auto pt-6 border-t border-white/5">
                <p class="text-[9px] text-gray-600 text-center uppercase tracking-widest">Sons Bwé Fixe © 2026</p>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-[150] hidden backdrop-blur-sm"></div>

    <button id="open-menu" onclick="document.getElementById('side-menu').classList.remove('hidden')" class="fixed top-6 right-6 z-[100] w-12 h-12 bg-[#2E5EBE] rounded-full shadow-lg hover:scale-110 transition flex items-center justify-center">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div id="main-wrapper" class="transition-all duration-300 pb-28">
        <main class="w-full max-w-sm sm:max-w-lg md:max-w-2xl lg:max-w-4xl xl:max-w-5xl mx-auto pt-8 px-4 sm:px-6">

            <div class="flex items-center gap-4 mb-10">
                <a href="index.html" class="w-10 h-10 glass rounded-xl flex items-center justify-center border border-white/5 hover:border-blue-500/40 hover:text-blue-400 transition flex-shrink-0">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                </a>
                <div class="flex items-center gap-4 flex-1">
                    <div id="cat-icon-bg" class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0 bg-white/5">
                        <i id="cat-icon" class="fa-solid fa-music text-gray-400"></i>
                    </div>
                    <div>
                        <h1 id="cat-titulo" class="text-3xl sm:text-4xl font-black tracking-tighter leading-none">—</h1>
                        <p id="cat-count" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">A carregar...</p>
                    </div>
                </div>
            </div>

            <div id="grid-musicas" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-10"></div>

            <div id="empty-state" class="hidden text-center py-24">
                <i class="fa-solid fa-music text-6xl text-gray-800 mb-6"></i>
                <p class="text-gray-600 font-black uppercase text-xs tracking-widest">Nenhuma faixa nesta categoria ainda</p>
                <p class="text-gray-700 text-xs mt-2">Publica músicas nesta categoria para aparecerem aqui</p>
            </div>

        </main>
    </div>

    <div id="side-menu" class="fixed inset-0 z-[300] hidden">
        <div id="close-menu" onclick="document.getElementById('side-menu').classList.add('hidden')" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 bottom-0 w-72 bg-[#020617] border-l border-white/10 p-8 flex flex-col shadow-2xl">
            <h3 class="font-black text-xl text-[#FBD8AB] mb-10 uppercase tracking-tighter">Menu</h3>
            <nav class="flex flex-col gap-6 font-bold text-sm uppercase">
                <a href="index.html" class="hover:text-[#EF3C54] transition flex items-center gap-3"><i class="fa-solid fa-house text-[#2E5EBE]"></i>Home</a>
                <a href="login.html" id="link-login" class="hover:text-[#EF3C54] transition flex items-center gap-3"><i class="fa-solid fa-right-to-bracket text-[#2E5EBE]"></i>Entrar</a>
                <a href="perfil.html" class="hover:text-[#EF3C54] transition flex items-center gap-3"><i class="fa-solid fa-user text-[#2E5EBE]"></i>Perfil</a>
                <a href="contacto.html" class="hover:text-[#EF3C54] transition flex items-center gap-3"><i class="fa-solid fa-envelope text-[#2E5EBE]"></i>Contactos</a>
                <a href="admin.html" id="link-admin" class="hidden mt-4 pt-4 border-t border-white/10 text-orange-500 hover:text-orange-400 flex items-center gap-3">
                    <i class="fa-solid fa-shield-halved"></i>Admin
                </a>
                <button onclick="logout()" id="btn-logout" class="hidden text-left text-red-500 hover:text-red-400 mt-4 flex items-center gap-3 uppercase">
                    <i class="fa-solid fa-power-off"></i>Sair
                </button>
            </nav>
        </div>
    </div>

    <!-- Mini Player fixo em baixo -->
    <div id="mini-player" class="fixed bottom-0 left-0 right-0 z-[400] bg-[#020617]/95 backdrop-blur-xl border-t border-white/10 px-4 sm:px-6 py-3 flex items-center gap-4 shadow-2xl">
        <img id="mini-cover" src="assets/default.png" class="w-12 h-12 rounded-xl object-cover flex-shrink-0" onerror="this.src='assets/default.png'">
        <div class="flex-1 overflow-hidden min-w-0">
            <p id="mini-title" class="text-xs font-black text-white truncate">—</p>
            <p id="mini-artist" class="text-[9px] text-gray-500 uppercase truncate">—</p>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
            <button onclick="musicaAnteriorCat()" class="text-gray-500 hover:text-white transition text-xl"><i class="fa-solid fa-backward-step"></i></button>
            <button id="mini-play-btn" onclick="togglePlayCat()" class="w-11 h-11 rounded-full bg-[#EF3C54] flex items-center justify-center text-white hover:scale-105 transition shadow-lg">
                <i class="fa-solid fa-play text-sm"></i>
            </button>
            <button onclick="proximaMusicaCat()" class="text-gray-500 hover:text-white transition text-xl"><i class="fa-solid fa-forward-step"></i></button>
        </div>
        <div class="flex-1 max-w-xs hidden sm:flex items-center gap-2">
            <span id="mini-current" class="text-[9px] text-gray-600 w-7 text-right">0:00</span>
            <input type="range" id="mini-progress" value="0" min="0" max="100" class="w-full h-1 accent-[#EF3C54] cursor-pointer">
            <span id="mini-duration" class="text-[9px] text-gray-600 w-7">0:00</span>
        </div>
    </div>

    <audio id="main-audio" class="hidden"></audio>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
    <script src="categoria-page.js"></script>
</body>
</html>
