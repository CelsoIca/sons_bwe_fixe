<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Sons Bwé Fixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white min-h-screen flex flex-col md:flex-row">

    <!-- SIDEBAR ESQUERDA -->
    <aside class="w-full md:w-80 bg-[#03081c] border-r border-white/5 p-8 flex flex-col gap-6 md:h-screen md:sticky md:top-0 overflow-y-auto">

        <!-- Logo + Nome do utilizador -->
        <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#2E5EBE] to-[#EF3C54] flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-headphones text-white text-sm"></i>
            </div>
            <div class="overflow-hidden">
                <p id="sidebar-nome" class="text-sm font-black text-white truncate">—</p>
                <p class="text-[8px] text-gray-600 font-bold uppercase tracking-widest">Membro Oficial</p>
            </div>
        </div>

        <div class="border-t border-white/5 pt-4 space-y-5">
            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-500 uppercase">Nome de Exibição</label>
                <input type="text" id="edit-nome" placeholder="Teu Nome"
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-blue-500 transition">
            </div>

            <div class="space-y-1 opacity-60">
                <label class="text-[9px] font-black text-gray-500 uppercase">E-mail</label>
                <p id="user-email" class="text-xs font-medium px-1 text-gray-400">—</p>
            </div>

            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-500 uppercase">Localização</label>
                <input type="text" id="edit-local" placeholder="Ex: Luanda, AO"
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs outline-none focus:border-blue-500 transition">
            </div>

            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-500 uppercase">Contacto</label>
                <input type="tel" id="edit-tel" placeholder="+244 ..."
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs outline-none focus:border-blue-500 transition">
            </div>

            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-500 uppercase">Gostos Musicais</label>
                <textarea id="edit-gostos" placeholder="Ex: Kizomba, Rap, Semba..."
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs h-20 outline-none resize-none focus:border-blue-500 transition"></textarea>
            </div>

            <button onclick="salvarPerfil()" id="btn-save"
                class="w-full bg-blue-600 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-500 active:scale-95 transition shadow-lg">
                <i class="fa-solid fa-floppy-disk mr-2"></i>Guardar Alterações
            </button>
        </div>

        <!-- Rank -->
        <div class="mt-auto pt-6 border-t border-white/5">
            <div class="glass p-4 rounded-2xl flex items-center justify-between border border-white/5">
                <div>
                    <p class="text-[8px] font-black text-gray-500 uppercase">Rank de Ouvinte</p>
                    <p id="nivel-texto" class="text-xs font-black text-emerald-400">NÍVEL 1</p>
                </div>
                <div class="text-right">
                    <p id="total-plays" class="text-lg font-black italic">0</p>
                    <p class="text-[7px] text-gray-600 font-bold uppercase">Plays Totais</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-1 p-6 md:p-10 overflow-y-auto">

        <!-- Topo: Home + Logoff -->
        <nav class="flex justify-between items-center mb-10">
            <a href="index.html" class="w-10 h-10 glass rounded-full flex items-center justify-center hover:scale-110 transition border border-white/10" title="Início">
                <i class="fa-solid fa-house text-xs"></i>
            </a>
            <button onclick="auth.signOut().then(() => location.href='login.html')"
                class="flex items-center gap-2 bg-red-500/10 hover:bg-red-500 px-5 py-2.5 rounded-full transition-all group">
                <span class="text-[9px] font-black uppercase tracking-widest text-red-500 group-hover:text-white">Sair</span>
                <i class="fa-solid fa-power-off text-xs text-red-500 group-hover:text-white"></i>
            </button>
        </nav>

        <!-- Cabeçalho do perfil: Avatar inicial + Nome -->
        <section class="flex flex-col items-center mb-12">
            <div class="w-28 h-28 rounded-[2rem] border-4 border-[#2E5EBE]/60 bg-gradient-to-br from-[#2E5EBE]/30 to-[#EF3C54]/20 flex items-center justify-center shadow-2xl shadow-blue-500/10 mb-4">
                <span id="display-initial" class="text-4xl font-black text-blue-400">?</span>
            </div>
            <h2 id="display-name" class="text-3xl font-black italic tracking-tighter">Utilizador</h2>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Membro Oficial · Sons Bwé Fixe</p>
        </section>

        <!-- Músicas mais ouvidas -->
        <section class="max-w-2xl mx-auto">
            <h3 class="text-[10px] font-black uppercase text-gray-500 mb-5 tracking-[0.3em] flex items-center gap-3">
                <span class="w-8 h-px bg-white/10"></span>Mais Ouvidas por Ti
            </h3>
            <div id="lista-mais-ouvidas" class="space-y-3">
                <p class="text-[10px] text-gray-700 italic text-center py-6">A carregar...</p>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
    <script>
        // Único listener de auth — carrega tudo de uma vez
        auth.onAuthStateChanged(async (user) => {
            if (!user) { location.href = 'login.html'; return; }

            const snap = await db.collection("users").doc(user.uid).get();
            const data = snap.data() || {};
            const nome = data.nome || user.email.split('@')[0];

            // Preencher sidebar e cabeçalho
            document.getElementById('sidebar-nome').innerText  = nome;
            document.getElementById('display-name').innerText  = nome;
            document.getElementById('display-initial').innerText = nome.charAt(0).toUpperCase();
            document.getElementById('user-email').innerText    = data.email || user.email;
            document.getElementById('edit-nome').value         = data.nome || '';
            document.getElementById('edit-local').value        = data.localizacao || '';
            document.getElementById('edit-tel').value          = data.contacto || '';
            document.getElementById('edit-gostos').value       = data.gostos || '';

            // Carregar estatísticas de plays
            carregarEstatisticas(user.uid);
            carregarMaisOuvidas(user.uid);
        });

        async function carregarEstatisticas(uid) {
            const snap = await db.collection("users").doc(uid).collection("estatisticas").get();
            let total = 0;
            snap.forEach(d => { total += d.data().plays || 0; });
            document.getElementById('total-plays').innerText = total;
            document.getElementById('nivel-texto').innerText = 'NÍVEL ' + (Math.floor(total / 50) + 1);
        }

        async function carregarMaisOuvidas(uid) {
            const lista = document.getElementById('lista-mais-ouvidas');
            const snap  = await db.collection("users").doc(uid)
                .collection("estatisticas").orderBy("plays","desc").limit(5).get();

            if (snap.empty) {
                lista.innerHTML = "<p class='text-[10px] text-gray-600 italic text-center py-6'>Ainda não ouviste nenhuma música.</p>";
                return;
            }
            lista.innerHTML = '';
            for (const statDoc of snap.docs) {
                const plays    = statDoc.data().plays;
                const musicaDoc = await db.collection("playlist").doc(statDoc.id).get();
                if (!musicaDoc.exists) continue;
                const m = musicaDoc.data();
                const div = document.createElement('div');
                div.className = "glass p-4 rounded-[1.5rem] border border-white/5 flex items-center justify-between hover:border-blue-500/30 transition group";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${m.capa || 'assets/default.png'}" class="w-10 h-10 rounded-xl object-cover bg-white/5" onerror="this.src='assets/default.png'">
                        <div>
                            <p class="text-xs font-black text-white group-hover:text-blue-400 transition truncate max-w-[180px]">${m.titulo}</p>
                            <p class="text-[9px] text-gray-500 uppercase font-bold">${m.artista}</p>
                        </div>
                    </div>
                    <span class="text-[10px] font-black text-blue-400 italic flex-shrink-0">${plays} plays</span>`;
                lista.appendChild(div);
            }
        }

        async function salvarPerfil() {
            const btn = document.getElementById('btn-save');
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>A guardar...';
            btn.disabled = true;
            try {
                await db.collection("users").doc(auth.currentUser.uid).update({
                    nome:        document.getElementById('edit-nome').value.trim(),
                    localizacao: document.getElementById('edit-local').value.trim(),
                    contacto:    document.getElementById('edit-tel').value.trim(),
                    gostos:      document.getElementById('edit-gostos').value.trim()
                });
                // Actualizar nome visualmente sem reload
                const novoNome = document.getElementById('edit-nome').value.trim();
                if (novoNome) {
                    document.getElementById('display-name').innerText  = novoNome;
                    document.getElementById('sidebar-nome').innerText  = novoNome;
                    document.getElementById('display-initial').innerText = novoNome.charAt(0).toUpperCase();
                }
                btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Guardado!';
                setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2000);
            } catch (e) {
                alert("Erro ao guardar. Tenta novamente.");
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
